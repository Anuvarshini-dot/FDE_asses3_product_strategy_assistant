services:
  - type: web
    name: product-strategy-assistant
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && python3 -m venv .venv && .venv/bin/pip install -r requirements.txt
    startCommand: cd backend && .venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18.0.0
